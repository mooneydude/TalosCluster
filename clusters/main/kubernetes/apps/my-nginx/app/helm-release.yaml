---
# yaml-language-server: schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: my-nginx
  namespace: my-nginx
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 14.4.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    global:
      stopAll: false

    TZ: America/Chicago
    workload:
      main:
        podSpec:
          containers:
            main:
              args:
                - --port
                - "8080"

    service:
      main:
        enabled: true
        ports:
          main:
            port: 8080
            targetPort: 8080
        portsList:
          - name: "extraport"
            enabled: true
            port: 9118
            targetPort: 9118

    serviceList:
      - name: extraservice
        enabled: true
        portsList:
          - name: "extrasvcport"
            enabled: true
            port: 9119
            targetPort: 9119

    persistence:
      config:
        enabled: true
        mountPath: "/config"
        type: pvc
        accessMode: ReadWriteOnce
        size: "100Gi"